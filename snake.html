<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經典貪食蛇遊戲</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2rem;
            color: #4CAF50;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
        }

        #score-board {
            font-size: 1.2rem;
            margin-bottom: 15px;
            font-weight: bold;
        }

        #score {
            color: #ffeb3b;
        }

        #game-container {
            position: relative;
            background-color: #111;
            border: 4px solid #333;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            background-color: #000;
        }

        /* 遊戲結束覆蓋層 */
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            display: none; /* 預設隱藏 */
            border-radius: 4px;
        }

        #game-over-screen h2 {
            color: #f44336;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        #restart-btn {
            padding: 12px 24px;
            font-size: 1.1rem;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #restart-btn:hover {
            background-color: #45a049;
        }

        /* 手機虛擬按鍵 */
        #controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 50px);
            gap: 10px;
            justify-content: center;
        }

        .btn {
            background-color: #333;
            color: white;
            border: 2px solid #555;
            border-radius: 8px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }

        .btn:active {
            background-color: #555;
        }

        #btn-up { grid-column: 2; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }

        /* 隱藏電腦版不需要的提示，或給予操作提示 */
        #tip {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>貪食蛇大作戰</h1>
    <div id="score-board">分數: <span id="score">0</span></div>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="game-over-screen">
            <h2>遊戲結束</h2>
            <button id="restart-btn">再試一次</button>
        </div>
    </div>

    <div id="controls">
        <div class="btn" id="btn-up">▲</div>
        <div class="btn" id="btn-left">◀</div>
        <div class="btn" id="btn-down">▼</div>
        <div class="btn" id="btn-right">▶</div>
    </div>

    <div id="tip">提示：使用鍵盤方向鍵 (↑ ↓ ← →) 或螢幕按鍵控制</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const gameOverScreen = document.getElementById("game-over-screen");
        const restartBtn = document.getElementById("restart-btn");

        // 遊戲設定
        const gridSize = 20; // 每個格子的像素大小
        const tileCount = canvas.width / gridSize; // 一列有幾個格子 (400/20 = 20)
        
        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = gridSize; // 水平移動速度與方向
        let dy = 0;        // 垂直移動速度與方向
        let score = 0;
        let gameInterval;
        let gameSpeed = 100; // 遊戲刷新速度 (毫秒)，越小越快
        let changingDirection = false; // 防止連續快速按鍵導致自殺的 Bug

        // 初始化/開始遊戲
        function startGame() {
            // 蛇的初始位置 (中間)
            snake = [
                { x: 10 * gridSize, y: 10 * gridSize },
                { x: 9 * gridSize, y: 10 * gridSize },
                { x: 8 * gridSize, y: 10 * gridSize }
            ];
            score = 0;
            scoreElement.innerText = score;
            dx = gridSize;
            dy = 0;
            gameOverScreen.style.display = "none";
            createFood();
            
            clearInterval(gameInterval);
            gameInterval = setInterval(main, gameSpeed);
        }

        // 遊戲主循環
        function main() {
            if (hasGameEnded()) {
                gameOverScreen.style.display = "flex";
                clearInterval(gameInterval);
                return;
            }

            changingDirection = false;
            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();
        }

        // 清空畫布
        function clearCanvas() {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // 畫蛇
        function drawSnake() {
            snake.forEach((part, index) => {
                // 頭部用深綠色，身體用淺綠色
                ctx.fillStyle = index === 0 ? "#2E7D32" : "#4CAF50";
                ctx.strokeStyle = "#1a1a1a";
                
                ctx.fillRect(part.x, part.y, gridSize, gridSize);
                ctx.strokeRect(part.x, part.y, gridSize, gridSize);
            });
        }

        // 移動蛇
        function moveSnake() {
            // 計算新的蛇頭位置
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            // 檢查有沒有吃到食物
            const hasEatenFood = snake[0].x === food.x && snake[0].y === food.y;
            if (hasEatenFood) {
                score += 10;
                scoreElement.innerText = score;
                createFood();
            } else {
                // 沒吃到食物就把尾巴去掉
                snake.pop();
            }
        }

        // 隨機生成食物
        function createFood() {
            food.x = Math.floor(Math.random() * tileCount) * gridSize;
            food.y = Math.floor(Math.random() * tileCount) * gridSize;

            // 確保食物不會生在蛇的身上
            snake.forEach(part => {
                const hasEaten = part.x === food.x && part.y === food.y;
                if (hasEaten) createFood();
            });
        }

        // 畫出食物
        function drawFood() {
            ctx.fillStyle = "#f44336"; // 紅色食物
            ctx.beginPath();
            // 畫圓形食物
            const radius = gridSize / 2;
            ctx.arc(food.x + radius, food.y + radius, radius - 2, 0, 2 * Math.PI);
            ctx.fill();
        }

        // 判定碰撞（結束遊戲）
        function hasGameEnded() {
            // 撞自己
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            // 撞牆壁
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= canvas.width;
            const hitToptWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= canvas.height;

            return hitLeftWall || hitRightWall || hitToptWall || hitBottomWall;
        }

        // 改變方向的邏輯
        function changeDirection(direction) {
            if (changingDirection) return;

            const goingUp = dy === -gridSize;
            const goingDown = dy === gridSize;
            const goingRight = dx === gridSize;
            const goingLeft = dx === -gridSize;

            if (direction === "LEFT" && !goingRight) { dx = -gridSize; dy = 0; changingDirection = true; }
            if (direction === "UP" && !goingDown) { dx = 0; dy = -gridSize; changingDirection = true; }
            if (direction === "RIGHT" && !goingLeft) { dx = gridSize; dy = 0; changingDirection = true; }
            if (direction === "DOWN" && !goingUp) { dx = 0; dy = gridSize; changingDirection = true; }
        }

        // 監聽鍵盤事件
        window.addEventListener("keydown", e => {
            if (e.key === "ArrowLeft" || e.key === "a") changeDirection("LEFT");
            if (e.key === "ArrowUp" || e.key === "w") changeDirection("UP");
            if (e.key === "ArrowRight" || e.key === "d") changeDirection("RIGHT");
            if (e.key === "ArrowDown" || e.key === "s") changeDirection("DOWN");
            
            // 防止按方向鍵時網頁滾動
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.key) > -1) {
                e.preventDefault();
            }
        });

        // 監聽手機版螢幕按鍵
        document.getElementById("btn-up").addEventListener("click", () => changeDirection("UP"));
        document.getElementById("btn-down").addEventListener("click", () => changeDirection("DOWN"));
        document.getElementById("btn-left").addEventListener("click", () => changeDirection("LEFT"));
        document.getElementById("btn-right").addEventListener("click", () => changeDirection("RIGHT"));

        // 重新開始按鈕
        restartBtn.addEventListener("click", startGame);

        // 啟動遊戲
        startGame();
    </script>
</body>
</html>
